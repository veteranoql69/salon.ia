name: Deploy Salon.IA to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: veteranoql69/salon.ia

jobs:
  # ─── 1. Build & Push imagen a GHCR ────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── 2. Deploy vía SSH (Directo al Servidor) ─────────────────────────────
  deploy-ssh:
    name: Deploy to Swarm via SSH
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code (para el stack file)
        uses: actions/checkout@v4

      - name: Copy stack file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.stack.yml"
          target: "/opt/salon-ia/"

      - name: SSH Remote Commands (Redeploy)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            # Forzar descarga de la nueva imagen
            docker pull ghcr.io/veteranoql69/salon.ia:latest
            
            # Desplegar/Actualizar el stack en Swarm
            docker stack deploy \
              --with-registry-auth \
              --compose-file /opt/salon-ia/docker-compose.stack.yml \
              salon-ia
            
            echo "✅ Salon.IA actualizado exitosamente"
